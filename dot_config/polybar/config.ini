; ============================================================
; Polybar — single horizontal bar on the laptop, transparent,
; styled after the XFCE panel. Vertical orientation isn't well
; supported in polybar; see notes at the bottom.
; ============================================================

[colors]
; XFCE panel background was solid #dedddb. Inverted to dark with
; ~70% alpha for transparency over wallpaper.
background = #00000000
foreground = #e0e0e0
primary    = #89b4fa
accent     = #f5c2e7
disabled   = #6c7086
alert      = #f38ba8

[bar/main]
monitor = ${env:MONITOR:eDP}
width   = 100%
height  = 28px
offset-x = 0
offset-y = 0
bottom = false
radius = 0
fixed-center = true
padding-left  = 3
padding-right = 3
module-margin = 1
border-size = 0pt

background = ${colors.background}
foreground = ${colors.foreground}

font-0 = "NewComputerModernSans10:style=Regular:size=11;2"
font-1 = "JetBrainsMono Nerd Font:size=14;3"

modules-left   = i3
modules-center = date
modules-right  = cpu memory pulseaudio battery wlan tray powermenu

cursor-click = pointer
enable-ipc = true
wm-restack = i3

; ============================================================
; MODULES
; ============================================================

[module/i3]
type = internal/i3
pin-workspaces = false
show-urgent = true
index-sort = true
enable-click = true
enable-scroll = true
reverse-scroll = true

label-focused             = %index%
label-focused-background  = #33ffffff
label-focused-foreground  = ${colors.primary}
label-focused-padding     = 1
label-unfocused           = %index%
label-unfocused-padding   = 1
label-visible             = %index%
label-visible-foreground  = ${colors.disabled}
label-visible-padding     = 1
label-urgent              = %index%
label-urgent-foreground   = ${colors.alert}
label-urgent-padding      = 1

[module/date]
type = internal/date
interval = 5
date = %a %m %d
time = %H:%M
label = %date%  %time%

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾
ramp-volume-font = 2
ramp-volume-foreground = #ffffff
format-muted-prefix = "󰝟 "
format-muted-prefix-font = 2
format-muted-prefix-foreground = ${colors.disabled}
format-muted = <label-muted>
label-muted = "muted"
label-muted-foreground = ${colors.disabled}
interval = 1
click-left = pactl set-sink-mute @DEFAULT_SINK@ toggle
click-right = pavucontrol

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 99
low-at  = 15
format-charging    = %{A1:xfce4-power-manager-settings:}%{A4:/usr/bin/brightnessctl -q set +5%:}%{A5:/usr/bin/brightnessctl -q set 5%-:}<label-charging>%{A}%{A}%{A}
format-discharging = %{A1:xfce4-power-manager-settings:}%{A4:/usr/bin/brightnessctl -q set +5%:}%{A5:/usr/bin/brightnessctl -q set 5%-:}<label-discharging>%{A}%{A}%{A}
format-full        = %{A1:xfce4-power-manager-settings:}%{A4:/usr/bin/brightnessctl -q set +5%:}%{A5:/usr/bin/brightnessctl -q set 5%-:}<label-full>%{A}%{A}%{A}
format-low         = %{A1:xfce4-power-manager-settings:}%{A4:/usr/bin/brightnessctl -q set +5%:}%{A5:/usr/bin/brightnessctl -q set 5%-:}<label-low>%{A}%{A}%{A}
label-charging    = "CHG %percentage%%"
label-charging-foreground = ${colors.primary}
label-discharging = "BAT %percentage%%"
label-full        = "FULL"
label-full-foreground = ${colors.disabled}
label-low         = "low %percentage%%"
label-low-foreground = ${colors.alert}

[module/wlan]
type = internal/network
interface-type = wireless
interval = 5
format-connected = <ramp-signal>
format-disconnected = <label-disconnected>
format-disconnected-prefix = ""
format-disconnected-prefix-font = 2
format-disconnected-prefix-foreground = ${colors.disabled}
label-disconnected = "offline"
label-disconnected-foreground = ${colors.disabled}
ramp-signal-0 = ""
ramp-signal-1 = ""
ramp-signal-2 = ""
ramp-signal-3 = ""
ramp-signal-4 = ""
ramp-signal-font = 2
ramp-signal-foreground = ${colors.foreground}

[module/cpu]
; custom/script (not internal/cpu) so it shares the exact load calculation with
; the zsh `sysmon` monitor — see ~/.local/bin/cpu-load. Unlike internal/cpu, this
; counts iowait as idle (the top/htop convention), not as load.
type = custom/script
exec = $HOME/.local/bin/cpu-load polybar
interval = 2
format = <label>
label = CPU %output%%

[module/memory]
type = internal/memory
interval = 2
format = <label>
label = RAM %percentage_used%%

[module/tray]
type = internal/tray
tray-padding = 2px
tray-size = 18px

[module/powermenu]
type = custom/menu
expand-right = false
format-spacing = 1

label-open = ""
label-open-font = 2
label-open-foreground = ${colors.alert}
label-close = ""
label-close-font = 2
label-close-foreground = ${colors.disabled}
label-separator = " "
label-separator-foreground = ${colors.disabled}

menu-0-0 = ""
menu-0-0-font = 2
menu-0-0-foreground = ${colors.alert}
menu-0-0-exec = $HOME/.config/polybar/scripts/confirm-poweroff.sh
menu-0-1 = ""
menu-0-1-font = 2
menu-0-1-foreground = ${colors.accent}
menu-0-1-exec = systemctl reboot
menu-0-2 = ""
menu-0-2-font = 2
menu-0-2-foreground = ${colors.primary}
menu-0-2-exec = i3lock
menu-0-3 = ""
menu-0-3-font = 2
menu-0-3-foreground = ${colors.disabled}
menu-0-3-exec = menu-open-1

; Confirmation submenu for "exit i3"
menu-1-0 = "cancel"
menu-1-0-foreground = ${colors.disabled}
menu-1-0-exec = menu-open-0
menu-1-1 = "exit i3"
menu-1-1-foreground = ${colors.alert}
menu-1-1-exec = i3-msg exit

[settings]
screenchange-reload = true
pseudo-transparency = false

; ============================================================
; Notes on vertical:
; Polybar (3.7) cannot stack modules vertically inside one bar.
; Multi-bar attempts auto-stack and don't honor offset-y reliably
; even with override-redirect=true. For a true XFCE-deskbar-like
; vertical strip on the right edge, eww is the recommended tool.
; ============================================================
