#################################
#         picom config          #
#  Target version: picom v10+   #
#################################
#
# Format: libconfig. Strings in quotes, semicolons end entries,
# arrays use [ ], tables use { }. Comments start with # or //.
#
# Reload picom after editing:
#   killall -USR1 picom        # live reload (most options)
#   systemctl --user restart picom  # if running under systemd
#
# Test what's slow / broken:
#   picom --diagnostics
#   picom -b --log-level=debug --log-file=/tmp/picom.log
#
# Tip: tweak ONE section at a time, reload, see how it feels.


#################################
#           Backend             #
#################################

# "glx"     -> GPU accelerated (OpenGL). Best for blur, fading, shadows.
# "xrender" -> CPU. Lower power, works on weak GPUs, fewer effects.
# "egl"     -> Like glx but uses EGL; sometimes smoother on AMD/Wayland-ish setups.
# If you see tearing or weird artifacts on AMD, try "egl" or "xrender".
backend = "glx";

# Use damage info from the X server to only repaint what changed.
# Almost always a win. Disable only if you see corruption.
use-damage = true;

# VSync. true = no tearing, but adds ~1 frame of latency.
# Turn off if you care about input latency (gaming) more than tearing.
vsync = true;


#################################
#           Shadows             #
#################################

# Master toggle. Drop shadows behind windows.
shadow = false;

# Shadow softness (blur radius). Bigger = softer / more spread.
shadow-radius = 12;

# Shadow opacity, 0.0 (invisible) - 1.0 (solid black).
shadow-opacity = 0.55;

# Shadow offset from the window's top-left corner, in pixels.
# Negative values shift the shadow up/left of the window.
shadow-offset-x = -12;
shadow-offset-y = -12;

# Shadow color. Default is black.
# shadow-red   = 0.0;
# shadow-green = 0.0;
# shadow-blue  = 0.0;

# Windows / regions that should NEVER get a shadow.
# This is where most "shadow looks weird on X" problems get fixed.
# Use `xprop` to find WM_CLASS / window name when adding entries.
shadow-exclude = [
  "name = 'Notification'",
  "name = 'Docky'",
  "name = 'Plank'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g = 'slop'",                 # screenshot selection overlay
  "_GTK_FRAME_EXTENTS@:c",            # GTK windows draw their own shadow
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];


#################################
#           Fading              #
#################################

# Fade windows in/out on open/close/minimize.
fading = false;

# How much opacity changes per step. Smaller = slower fade.
fade-in-step  = 0.05;
fade-out-step = 0.05;

# Milliseconds between fade steps. Larger = slower.
fade-delta = 8;

# Don't fade on these events:
# no-fading-openclose    = false;   # disable fade for open/close only
# no-fading-destroyed-argb = true;  # avoids weird fade on closing transparent windows

# Skip fading for specific windows.
fade-exclude = [
  # "class_g = 'slop'",
];


#################################
#       Transparency / Opacity  #
#################################

# Opacity of inactive windows (1.0 = fully opaque).
inactive-opacity = 1.0;

# Opacity of active window. Usually leave at 1.0.
active-opacity = 1.0;

# Opacity of window title bars / borders specifically (frames).
frame-opacity = 1.0;

# If true, inactive-opacity also applies to windows that already have
# their own _NET_WM_WINDOW_OPACITY set (e.g. transparent terminals).
inactive-opacity-override = false;

# Dim inactive windows by this fraction (0.0 - 1.0). 0 = no dimming.
inactive-dim = 0.0;

# Don't fiddle with opacity for windows that opt out (e.g. fullscreen apps).
# focus-exclude = [ "class_g = 'Cairo-clock'" ];

# Per-window opacity rules. Example forms:
#   "90:class_g = 'Bar'"           90% opacity for that class
#   "100:class_g = 'firefox' && !focused"
opacity-rule = [
  # "90:class_g = 'XTerm'",
  # "85:class_g = 'Alacritty' && focused",
  # "70:class_g = 'Alacritty' && !focused",
];


#################################
#             Blur              #
#################################
# Background blur for transparent windows. Requires glx/egl backend.
# Toggle the whole `blur:` block off by commenting it out if it hurts FPS.

blur-method = "none";

blur: {
  # "dual_kawase" -> fast, modern, looks great (recommended)
  # "kawase"      -> older variant
  # "gaussian"    -> classic, can be slow at large sizes
  # "box"         -> cheapest, blocky
  method = "none";

  # Blur strength. Higher = more blur, more GPU cost. 1-20 reasonable.
  strength = 7;

  # Whether to blur the background of semi-transparent windows.
  background = true;

  # Blur the background of fully opaque windows too (rarely useful).
  background-frame = false;

  # Use a fixed blur strength instead of computing per-frame.
  background-fixed = false;
}

# Don't blur behind these windows.
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'slop'",                 # screenshot selection overlay (maim/scrot)
  "class_g = 'flameshot'",            # flameshot freezes the screen; blur would double-blur its overlay
  "_GTK_FRAME_EXTENTS@:c"
];


#################################
#       Rounded corners         #
#################################
# picom v9+ supports rounded corners natively.

# Radius in pixels. 0 disables it.
corner-radius = 0;

# Don't round these.
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  "class_g = 'xfce4-panel'"
];


#################################
#         General behavior      #
#################################

# Mark the currently focused window so rules like `focused` work.
# Required for inactive-opacity / focus-exclude / focus-based opacity-rules.
mark-wmwin-focused = true;
mark-ovredir-focused = true;

# Detect rounded corners on windows that have them (for shadow shaping).
detect-rounded-corners = true;

# Use _NET_WM_WINDOW_OPACITY from clients.
detect-client-opacity = true;

# Detect transient/leader relationships so dialogs are treated like their parent.
detect-transient = true;
detect-client-leader = true;

# Group windows by leader for focus purposes. Usually leave false.
# detect-client-leader = false;

# Use EWMH _NET_ACTIVE_WINDOW instead of guessing focus. Recommended on XFCE.
use-ewmh-active-win = true;

# Unredirect fullscreen windows so games / video can bypass the compositor.
# Saves a lot of GPU when watching video / gaming. Can cause a 1-frame flicker
# when toggling fullscreen.
unredir-if-possible = true;
# unredir-if-possible-delay = 0;
# unredir-if-possible-exclude = [];

# Log level: "trace", "debug", "info", "warn", "error". Use "warn" normally.
log-level = "warn";
# log-file = "/tmp/picom.log";

# Show debug overlay (FPS, damage). Useful when tuning.
# show-all-xerrors = false;


#################################
#       Window type rules       #
#################################
# Per-EWMH-type defaults. These override the global settings above for
# that window type. Comment out fields you don't want to override.

wintypes:
{
  tooltip      = { fade = true;  shadow = false; opacity = 0.95; focus = true; full-shadow = false; };
  dock         = { shadow = false; clip-shadow-above = true; };
  dnd          = { shadow = false; };
  popup_menu   = { opacity = 0.95; shadow = false; };
  dropdown_menu= { opacity = 0.95; shadow = false; };
  menu         = { shadow = false; };
  utility      = { shadow = false; };
  notification = { shadow = false; };
  dialog       = { shadow = false; };
  normal       = { shadow = false; };
  splash       = { shadow = false; };
  desktop      = { shadow = false; blur-background = false; };
};
