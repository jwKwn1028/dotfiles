# keyd remapping template for the built-in ThinkPad keyboard.
# This file is inactive while it remains in the home directory.

[ids]

# AT Translated Set 2 keyboard, as reported by `keyd.rvaiya monitor -t`.
0001:0001:09b4e68d
# Use `*` instead if these mappings should apply to every keyboard.

[main]

# The Copilot key emits leftmeta+leftshift+f23 simultaneously.
# F13-F15 remain available for optional desktop shortcuts. Leaving Left Alt
# and Left Control unchanged is recommended because applications rely on them.
# leftmeta+leftshift+f23 = f13
# leftalt = f14
# leftcontrol = f15

# Keep the real NumLock key and keyd's conditional layer synchronized.
# IMPORTANT: NumLock must be OFF when keyd starts or reloads. keyd cannot
# discover the display server's existing NumLock state.
numlock = togglem(numlock_on, numlock)

# While NumLock is off, the keypad calculator/equal key keeps its normal
# kpequal behavior. F17 remains available for an optional desktop shortcut.
# kpequal = f17

[numlock_on]

# Emit a private function key for the desktop environment to handle. keyd
# remaps input events but does not launch programs itself. The companion i3
# binding launches Ghostty with Julia. On this X11 keymap, keyd's Linux F16
# event is exposed as XF86Launch7 (X keycode 194):
#   bindsym XF86Launch7 exec --no-startup-id /usr/bin/ghostty -e /home/kjw1028/.juliaup/bin/julia
kpequal = f16
