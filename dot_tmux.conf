##### ~/.tmux.conf #####

# --- 1. General Settings ---
set -g base-index 1              # Start window numbering at 1
set -g pane-base-index 1         # Start pane numbering at 1
set -g renumber-windows on       # Renumber windows when one is closed
set -g mouse on                  # Enable mouse support
set -g status off
set -g status-interval 5         # Refresh status line every 5 seconds
set -sg escape-time 10           # Reduce vi-mode lag in Helix
set -g focus-events on           # Forward focus events to apps (Helix autoread)
set -g history-limit 50000       # Bigger scrollback

# True Color Support (Fixes Helix themes)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Clipboard + copy-mode keys
set -g set-clipboard on
set -g mode-keys vi

# --- 1.1 Copy/Paste Fix (tmux buffer + system clipboard) ---
# This makes "vim-style" selection work (v/y) AND copies to your system clipboard.
# Priority: wl-copy (Wayland) -> xclip (X11) -> pbcopy (macOS) -> OSC52 fallback.
#
# NOTE: External clipboard requires one of wl-copy/xclip/pbcopy on the machine running tmux.
# (If your tmux is local, install locally; if your tmux is remote, install remotely.)

bind-key b set -g status
# Enter copy-mode (defaults already exist, but keep explicit)
# Prefix + [  : enter copy-mode
# Prefix + ]  : paste tmux buffer
bind-key [ copy-mode
bind-key ] paste-buffer

# Vim-like selection inside copy-mode
bind-key -T copy-mode-vi v     send -X begin-selection
bind-key -T copy-mode-vi V     send -X select-line
bind-key -T copy-mode-vi C-v   send -X rectangle-toggle

# Copy to tmux buffer + system clipboard, then exit copy-mode
bind-key -T copy-mode-vi y     send -X copy-pipe-and-cancel "clipcopy"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "clipcopy"

# Mouse selection: when you drag-select in copy-mode, copy+exit and push to system clipboard too
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "clipcopy"

# --- 2. Key Bindings (Navigation & Management) ---

# Split panes using current directory
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Resize pane (Zoom)
bind-key z resize-pane -Z

# Reload config file easily (Prefix + r)
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# --- 4. Status Bar: Floating Bubbles (Green #86BE43) ---

# 1. Base Style: Transparent background for the "Floating" effect
set -g status-position bottom
set -g status-style bg=default,fg=white

# 2. Left Side: Session & Pane Index
set -g status-left-length 50
set -g status-left "#[bg=#86BE43,fg=#2C3E50,bold]  #S #[bg=#254215,fg=#86BE43,nobold] P#P "

# 3. Center: Window List
set -g status-justify centre
setw -g window-status-format "#[fg=gray] #I:#W "
setw -g window-status-current-format "#[bg=#86BE43,fg=black,bold] #I:#W "

# 4. Right Side: Directory & Time (Removed Command)
set -g status-right-length 100
set -g status-right "#[fg=#86BE43,bold]   #{=50:pane_current_path} #[fg=gray]"

# --- 5. Advanced: Passthrough & Environment ---
set -g allow-passthrough on
set -g update-environment "DISPLAY KRB5CCNAME SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY TERM_PROGRAM"
